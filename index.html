<!DOCTYPE html><html lang='en'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1.0'>
<title>Shreyas Epic Quest Deluxe</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:linear-gradient(135deg,#020617,#0f172a,#111827);color:#fff;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:12px}#app{width:min(96vw,980px)}h1{text-align:center;margin:8px 0 14px;font-size:clamp(2rem,4vw,3.3rem);letter-spacing:.5px}.glow{color:#67e8f9;text-shadow:0 0 12px rgba(103,232,249,.55)}#hud{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(10px);padding:12px;border-radius:20px;box-shadow:0 10px 24px rgba(0,0,0,.28)}button{width:100%;padding:12px;border:none;border-radius:16px;font-weight:800;background:linear-gradient(135deg,#22c55e,#14b8a6);color:#fff}canvas{display:block;margin:auto;width:min(92vw,760px);height:min(92vw,760px);max-width:760px;max-height:760px;border-radius:26px;border:3px solid rgba(103,232,249,.65);background:#020617;box-shadow:0 0 35px rgba(34,211,238,.28);touch-action:none}#msg{text-align:center;margin-top:12px;font-weight:800;color:#fde047;min-height:30px}.tip{text-align:center;color:#cbd5e1;font-size:.92rem;margin-top:6px}
</style>
</head>
<body>
<div id='app'>
<h1>⚔️ <span class='glow'>Shreyas Epic Quest Deluxe</span></h1>
<div id='hud'>
<div class='card'>⭐ Score: <span id='score'>0</span></div>
<div class='card'>🏆 Level: <span id='level'>1</span></div>
<div class='card'>⏱️ Time: <span id='time'>60</span>s</div>
<div class='card'><button onclick='restartGame()'>Restart Quest</button></div>
</div>
<canvas id='game' width='760' height='760'></canvas>
<div id='msg'>Find the glowing portal and escape the maze!</div>
<div class='tip'>Laptop: Arrow Keys / WASD • Phone & Tablet: Swipe firmly in any direction</div>
</div>
<script>
const c=document.getElementById('game'),x=c.getContext('2d');
const scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),timeEl=document.getElementById('time'),msg=document.getElementById('msg');
let cols=10,rows=10,size,grid=[],stack=[],player,goal,level=1,score=0,time=60,timer,trail=[];
function Cell(i,j){this.i=i;this.j=j;this.w=[1,1,1,1];this.v=false}
const id=(i,j)=>i+j*cols;
function maze(){grid=[];stack=[];for(let j=0;j<rows;j++)for(let i=0;i<cols;i++)grid.push(new Cell(i,j));let cur=grid[0];cur.v=true;while(true){let n=[];let {i,j}=cur;[[i,j-1,0],[i+1,j,1],[i,j+1,2],[i-1,j,3]].forEach(a=>{let ni=a[0],nj=a[1];if(ni>=0&&nj>=0&&ni<cols&&nj<rows&&!grid[id(ni,nj)].v)n.push([grid[id(ni,nj)],a[2]])});if(n.length){let p=n[Math.floor(Math.random()*n.length)],nx=p[0],d=p[1];stack.push(cur);cur.w[d]=0;nx.w[(d+2)%4]=0;nx.v=true;cur=nx}else if(stack.length)cur=stack.pop();else break;}}
function start(){cols=rows=Math.min(8+level,22);maze();player={i:0,j:0};goal={i:cols-1,j:rows-1};trail=[];time=Math.max(18,65-level*2);clearInterval(timer);timer=setInterval(()=>{time--;hud();if(time<=0){show('⏰ Time Over! Try again...');setTimeout(start,800)}},1000);show('✨ Level '+level+' begins!');hud();draw();}
function hud(){scoreEl.textContent=score;levelEl.textContent=level;timeEl.textContent=time}
function show(t){msg.textContent=t}
function draw(){size=c.width/cols;x.clearRect(0,0,c.width,c.height);let bg=x.createLinearGradient(0,0,c.width,c.height);bg.addColorStop(0,'#020617');bg.addColorStop(1,'#0f172a');x.fillStyle=bg;x.fillRect(0,0,c.width,c.height);
trail.forEach(p=>{x.fillStyle='rgba(34,197,94,.08)';x.fillRect(p.i*size+size*.2,p.j*size+size*.2,size*.6,size*.6)});
for(let cell of grid){let px=cell.i*size,py=cell.j*size;x.strokeStyle='rgba(103,232,249,.9)';x.lineWidth=Math.max(2,size*.05);if(cell.w[0])ln(px,py,px+size,py);if(cell.w[1])ln(px+size,py,px+size,py+size);if(cell.w[2])ln(px,py+size,px+size,py+size);if(cell.w[3])ln(px,py,px,py+size)}
let gx=goal.i*size+size/2,gy=goal.j*size+size/2;x.beginPath();x.fillStyle='#facc15';x.arc(gx,gy,size*.24,0,Math.PI*2);x.fill();x.shadowBlur=18;x.shadowColor='#fde047';x.fill();x.shadowBlur=0;
let px=player.i*size+size/2,py=player.j*size+size/2;x.beginPath();x.fillStyle='#22c55e';x.arc(px,py,size*.26,0,Math.PI*2);x.fill();x.beginPath();x.strokeStyle='rgba(34,197,94,.4)';x.lineWidth=8;x.arc(px,py,size*.34,0,Math.PI*2);x.stroke();}
function ln(a,b,d,e){x.beginPath();x.moveTo(a,b);x.lineTo(d,e);x.stroke()}
function move(dir){let cur=grid[id(player.i,player.j)];if(cur.w[dir]){show('🚧 Wall blocked your path!');score=Math.max(0,score-1);hud();return}trail.push({i:player.i,j:player.j});if(trail.length>25)trail.shift();if(dir===0)player.j--;if(dir===1)player.i++;if(dir===2)player.j++;if(dir===3)player.i--;score+=5;const praise=['🔥 Great!','⚡ Swift move!','🌟 Amazing!','💎 Brilliant!'];if(Math.random()<.35)show(praise[Math.floor(Math.random()*praise.length)]);if(player.i===goal.i&&player.j===goal.j){score+=100;clearInterval(timer);show('🎉 Victory! Portal reached! Next Level Unlocked!');level++;hud();draw();setTimeout(start,1200);return}hud();draw();}
function restartGame(){level=1;score=0;start()}
addEventListener('keydown',e=>{let k=e.key.toLowerCase();if(k==='arrowup'||k==='w')move(0);if(k==='arrowright'||k==='d')move(1);if(k==='arrowdown'||k==='s')move(2);if(k==='arrowleft'||k==='a')move(3)});
let sx=0,sy=0;function handleSwipe(nx,ny){let dx=nx-sx,dy=ny-sy;if(Math.hypot(dx,dy)<24)return;if(Math.abs(dx)>Math.abs(dy))move(dx>0?1:3);else move(dy>0?2:0);sx=nx;sy=ny;}
c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY},{passive:true});c.addEventListener('touchmove',e=>{e.preventDefault();handleSwipe(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
start();
</script>
</body>
</html>
