<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epic Maze Quest</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
#wrap{width:min(95vw,900px);text-align:center}
canvas{background:#111827;border:4px solid #38bdf8;border-radius:16px;touch-action:none;max-width:100%;height:auto;box-shadow:0 0 25px rgba(56,189,248,.4)}
#hud{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin:10px 0}
.card{background:rgba(255,255,255,.08);padding:10px 14px;border-radius:12px;min-width:120px}
#msg{margin-top:10px;font-size:1.1rem;font-weight:bold;color:#facc15;min-height:28px}
button{padding:10px 16px;border:none;border-radius:12px;background:#22c55e;color:#fff;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div id='wrap'>
<h1>🌀 Epic Maze Quest</h1>
<div id='hud'>
<div class='card'>⭐ Score: <span id='score'>0</span></div>
<div class='card'>🎯 Level: <span id='level'>1</span></div>
<div class='card'>⏱️ Time: <span id='time'>60</span>s</div>
<button onclick='restartGame()'>Restart</button>
</div>
<canvas id='game' width='600' height='600'></canvas>
<div id='msg'>Find the golden exit!</div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const size=10; let cell=60; let level=1,score=0,time=60; let player={x:0,y:0}; let exit={x:9,y:9}; let walls=[]; let timer;
const msgs=['Brilliant move!','Amazing!','You are a maze master!','Keep going!','Legendary reflexes!'];
function rand(n){return Math.floor(Math.random()*n)}
function buildLevel(){cell=canvas.width/size; walls=[]; player={x:0,y:0}; exit={x:size-1,y:size-1}; for(let i=0;i<level*12;i++){let x=rand(size),y=rand(size); if((x||y)&&(x!=exit.x||y!=exit.y)) walls.push({x,y});} showMsg('Level '+level+' begins!'); resetTime(); draw();}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height); for(let y=0;y<size;y++)for(let x=0;x<size;x++){ctx.strokeStyle='#334155';ctx.strokeRect(x*cell,y*cell,cell,cell);} walls.forEach(w=>{ctx.fillStyle='#ef4444';ctx.fillRect(w.x*cell+4,w.y*cell+4,cell-8,cell-8)}); ctx.fillStyle='#facc15';ctx.fillRect(exit.x*cell+10,exit.y*cell+10,cell-20,cell-20); ctx.beginPath(); ctx.fillStyle='#22c55e'; ctx.arc(player.x*cell+cell/2,player.y*cell+cell/2,cell/3,0,Math.PI*2); ctx.fill(); }
function blocked(x,y){return x<0||y<0||x>=size||y>=size||walls.some(w=>w.x===x&&w.y===y)}
function move(dx,dy){let nx=player.x+dx,ny=player.y+dy; if(!blocked(nx,ny)){player.x=nx;player.y=ny; score+=5; if(Math.random()<0.3) showMsg(msgs[rand(msgs.length)]);} else {showMsg('Oops! Wall ahead!'); score=Math.max(0,score-2);} updateHUD(); draw(); if(player.x===exit.x&&player.y===exit.y){score+=100; level++; showMsg('🏆 Level cleared!'); updateHUD(); setTimeout(buildLevel,700);} }
function updateHUD(){scoreEl.textContent=score; levelEl.textContent=level; timeEl.textContent=time;}
function showMsg(t){msg.textContent=t;}
function resetTime(){clearInterval(timer); time=Math.max(25,60-level*2); timer=setInterval(()=>{time--; updateHUD(); if(time<=0){clearInterval(timer); showMsg('⏰ Time up! Retrying level...'); setTimeout(buildLevel,1000);} },1000); updateHUD();}
function restartGame(){level=1;score=0;buildLevel();}
window.addEventListener('keydown',e=>{if(e.key==='ArrowUp')move(0,-1); if(e.key==='ArrowDown')move(0,1); if(e.key==='ArrowLeft')move(-1,0); if(e.key==='ArrowRight')move(1,0);});
let lastTouch=null; canvas.addEventListener('touchstart',e=>{lastTouch=[e.touches[0].clientX,e.touches[0].clientY];}); canvas.addEventListener('touchmove',e=>{e.preventDefault(); let t=e.touches[0]; let dx=t.clientX-lastTouch[0],dy=t.clientY-lastTouch[1]; if(Math.abs(dx)>Math.abs(dy)){ if(dx>12) move(1,0); else if(dx<-12) move(-1,0);} else { if(dy>12) move(0,1); else if(dy<-12) move(0,-1);} lastTouch=[t.clientX,t.clientY];},{passive:false});
const scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),timeEl=document.getElementById('time'),msg=document.getElementById('msg');
buildLevel();
</script>
</body>
</html>
